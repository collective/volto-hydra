<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f9ff"/>
      <stop offset="100%" stop-color="#eef1ff"/>
    </linearGradient>
    <!-- Quadrant background colors -->
    <linearGradient id="q-tl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd54f" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffb300" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="q-tr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fc3f7" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#0288d1" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="q-bl" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef9a9a" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#e53935" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="q-br" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5d6a7" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#43a047" stop-opacity="0.15"/>
    </linearGradient>
    <!-- Hydra glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="hydraBg" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#0288d1" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#01579b" stop-opacity="0.95"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="500" rx="12" fill="url(#bgGrad)"/>

  <!-- Quadrant areas (offset for axis labels) -->
  <!-- Top-left: Site Builder -->
  <rect x="80" y="40" width="240" height="200" rx="8" fill="url(#q-tl)"/>
  <!-- Top-right: Hydra -->
  <rect x="320" y="40" width="240" height="200" rx="8" fill="url(#q-tr)"/>
  <!-- Bottom-left: Traditional CMS -->
  <rect x="80" y="240" width="240" height="200" rx="8" fill="url(#q-bl)"/>
  <!-- Bottom-right: Headless CMS -->
  <rect x="320" y="240" width="240" height="200" rx="8" fill="url(#q-br)"/>

  <!-- Axes -->
  <!-- Y-axis -->
  <line x1="80" y1="445" x2="80" y2="35" stroke="#455a64" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="80,32 75,42 85,42" fill="#455a64"/>
  <!-- X-axis -->
  <line x1="75" y1="440" x2="565" y2="440" stroke="#455a64" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="568,440 558,435 558,445" fill="#455a64"/>

  <!-- Axis labels -->
  <text x="40" y="245" text-anchor="middle" font-size="14" font-weight="700" fill="#37474f" transform="rotate(-90, 40, 245)">Visual Editing</text>
  <text x="330" y="475" text-anchor="middle" font-size="14" font-weight="700" fill="#37474f">Frontend Freedom</text>

  <!-- Axis direction hints -->
  <text x="18" y="60" font-size="10" fill="#78909c" transform="rotate(-90, 18, 60)">High</text>
  <text x="18" y="430" font-size="10" fill="#78909c" transform="rotate(-90, 18, 430)">Low</text>
  <text x="100" y="460" font-size="10" fill="#78909c">Low</text>
  <text x="540" y="460" font-size="10" fill="#78909c">High</text>

  <!-- Quadrant labels -->

  <!-- Site Builder (top-left) -->
  <g transform="translate(200, 120)">
    <rect x="-65" y="-22" width="130" height="44" rx="22" fill="#f57f17" opacity="0.9"/>
    <text text-anchor="middle" y="6" font-size="15" font-weight="700" fill="white">Site Builder</text>
  </g>
  <text x="200" y="175" text-anchor="middle" font-size="11" fill="#795548" opacity="0.8">Wix · Squarespace</text>

  <!-- Hydra (top-right) — emphasized -->
  <g transform="translate(440, 110)" filter="url(#glow)">
    <rect x="-70" y="-28" width="140" height="56" rx="28" fill="url(#hydraBg)"/>
    <text text-anchor="middle" y="-2" font-size="18" font-weight="800" fill="white">Hydra</text>
    <text text-anchor="middle" y="16" font-size="10" font-weight="500" fill="#b3e5fc">Best of both worlds</text>
  </g>

  <!-- Traditional CMS (bottom-left) -->
  <g transform="translate(200, 340)">
    <rect x="-75" y="-22" width="150" height="44" rx="22" fill="#c62828" opacity="0.75"/>
    <text text-anchor="middle" y="6" font-size="15" font-weight="700" fill="white">Traditional CMS</text>
  </g>
  <text x="200" y="395" text-anchor="middle" font-size="11" fill="#795548" opacity="0.8">WordPress · Drupal</text>

  <!-- Headless CMS (bottom-right) -->
  <g transform="translate(440, 340)">
    <rect x="-70" y="-22" width="140" height="44" rx="22" fill="#2e7d32" opacity="0.8"/>
    <text text-anchor="middle" y="6" font-size="15" font-weight="700" fill="white">Headless CMS</text>
  </g>
  <text x="440" y="395" text-anchor="middle" font-size="11" fill="#795548" opacity="0.8">Contentful · Strapi</text>

  <!-- Dashed crosshair lines -->
  <line x1="320" y1="45" x2="320" y2="435" stroke="#90a4ae" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="85" y1="240" x2="555" y2="240" stroke="#90a4ae" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
</svg>
