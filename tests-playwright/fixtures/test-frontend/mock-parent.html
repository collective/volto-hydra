<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mock Parent Window - Hydra Format Testing</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 10px;
    }
    #iframe-container {
      border: 2px solid #ccc;
      margin-top: 20px;
    }
    iframe {
      width: 100%;
      height: 600px;
      border: none;
    }
    #log {
      margin-top: 20px;
      padding: 10px;
      background: #f0f0f0;
      font-family: monospace;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
    }
    .log-entry {
      margin: 2px 0;
    }
    .log-sent {
      color: blue;
    }
    .log-received {
      color: green;
    }
    /* Block UI overlays - minimal versions for testing */
    .quanta-toolbar {
      position: fixed;
      background: #007eb1;
      padding: 4px 8px;
      border-radius: 4px;
      display: none;
      z-index: 1000;
    }
    .volto-hydra-block-outline {
      position: fixed;
      border: 2px solid #007eb1;
      pointer-events: none;
      display: none;
      z-index: 999;
    }
    .volto-hydra-add-button {
      position: fixed;
      background: #007eb1;
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: none;
      z-index: 1000;
      text-align: center;
      line-height: 24px;
    }
  </style>
</head>
<body>
  <h1>Mock Parent Window - Testing Hydra Format Protocol</h1>
  <p>This page mocks the Admin UI parent window to test iframe formatting without Volto.</p>

  <!-- Block UI overlays -->
  <div class="quanta-toolbar" id="quanta-toolbar">Toolbar</div>
  <div class="volto-hydra-block-outline" id="block-outline"></div>
  <div class="volto-hydra-add-button" id="add-button">+</div>

  <div id="iframe-container"></div>

  <div id="log">
    <div class="log-entry"><span style="font-weight: bold">Message Log:</strong></div>
  </div>

  <script type="module">
    import { buildBlockPathMap } from '/build-block-path-map.js';

    // Configure iframe frontend from ?frontend= URL param (default: mock frontend on 8888)
    const params = new URLSearchParams(window.location.search);
    const frontendOrigin = params.get('frontend') || 'http://localhost:8889';
    const contentName = params.get('content'); // e.g., 'examples' loads /examples.json
    const apiPath = params.get('api_path'); // e.g., '/block/toc-block' loads from API
    const adminOrigin = window.location.origin;

    // Derive API origin from api_path param if present, otherwise default
    const apiOrigin = apiPath ? new URL(apiPath).origin : 'http://localhost:8888';

    // Derive content path from api_path (e.g. "http://localhost:8891/blog" → "/blog")
    // Falls back to /_test_data/test-page for hydra's own test content
    const contentPath = apiPath ? new URL(apiPath).pathname : '/_test_data/test-page';

    // Create iframe dynamically so name is set BEFORE the browsing context is created.
    // Setting iframe.name after the element is in the DOM doesn't propagate to contentWindow.name.
    function createIframe() {
      const previewIframe = document.createElement('iframe');
      previewIframe.id = 'previewIframe';
      previewIframe.name = `hydra-edit:${adminOrigin}`;
      previewIframe.src = `${frontendOrigin}${contentPath}?_edit=true&_admin_origin=${adminOrigin}&_api_origin=${apiOrigin}&_hydra_debug=1`;
      document.getElementById('iframe-container').appendChild(previewIframe);
    }

    // Create iframe immediately if no content to fetch, otherwise after load
    if (!contentName && !apiPath) {
      createIframe();
    }

    console.log('[MOCK_PARENT] Loaded');

    // NOTE: No addNodeIds here — hydra.js adds nodeIds to all slate fields
    // when it receives FORM_DATA, so the mock parent (acting as admin) should
    // send plain Slate JSON without nodeIds, just like the real admin does.

    // blocksConfig for schema-driven buildBlockPathMap (no Volto deps)
    const mockBlocksConfig = {
      _page: {
        schema: () => ({
          properties: { blocks_layout: { widget: 'blocks_layout' } },
        }),
      },
      slate: { id: 'slate', blockSchema: { properties: { value: { widget: 'slate' } } } },
      hero: {
        id: 'hero',
        blockSchema: {
          properties: {
            heading: { type: 'string' },
            subheading: { type: 'string', widget: 'textarea' },
            buttonText: { type: 'string' },
            description: { widget: 'slate' },
          },
        },
      },
      image: { id: 'image', blockSchema: { properties: {} } },
      columns: {
        id: 'columns',
        blockSchema: {
          properties: {
            columns: { widget: 'blocks_layout', allowedBlocks: ['column'] },
          },
        },
      },
      column: {
        id: 'column',
        blockSchema: {
          properties: {
            blocks_layout: { widget: 'blocks_layout' },
          },
        },
      },
      slateTable: {
        id: 'slateTable',
        addMode: 'table',
        blockSchema: {
          properties: {
            table: {
              widget: 'object',
              schema: {
                properties: {
                  rows: {
                    widget: 'object_list',
                    idField: 'key',
                    addMode: 'table',
                    schema: {
                      properties: {
                        cells: {
                          widget: 'object_list',
                          idField: 'key',
                          schema: {
                            properties: {
                              value: { widget: 'slate' },
                            },
                          },
                        },
                      },
                    },
                  },
                },
              },
            },
          },
        },
      },
    };

    // Simple Slate transformation without needing full Slate library
    // This manually creates the expected structure for testing
    function applySlateTransform(value, selection, format, action) {
      const result = JSON.parse(JSON.stringify(value)); // Deep clone
      console.log('[MOCK_PARENT] applySlateTransform entry:', { value: JSON.stringify(value), selection: JSON.stringify(selection), format, action });

      if (!selection || !result[0] || !result[0].children) {
        console.log('[MOCK_PARENT] applySlateTransform: early return (no selection/result/children)');
        return result;
      }

      const paragraph = result[0];
      const anchor = selection.anchor;
      const focus = selection.focus;

      // Get selection bounds
      const start = Math.min(anchor.offset, focus.offset);
      const end = Math.max(anchor.offset, focus.offset);
      console.log('[MOCK_PARENT] applySlateTransform:', { start, end, anchorPath: JSON.stringify(anchor.path), focusPath: JSON.stringify(focus.path) });

      // Get the text from first child (assuming simple structure for now)
      const textNode = paragraph.children[0];
      if (!textNode || !textNode.text) {
        console.log('[MOCK_PARENT] applySlateTransform: early return (no textNode or no text)', { textNode: JSON.stringify(textNode) });
        return result;
      }

      const originalText = textNode.text;
      console.log('[MOCK_PARENT] applySlateTransform:', { originalText, collapsed: start === end });

      // Handle collapsed selection (prospective formatting):
      // Insert an empty inline element at the cursor position so subsequent
      // typing goes into the formatted span.
      if (start === end) {
        const before = originalText.substring(0, start);
        const after = originalText.substring(start);
        // Slate normalization: text nodes must surround inline elements
        paragraph.children = [
          { text: before },
          { type: format, children: [{ text: '' }] },
          { text: after },
        ];
        return result;
      }

      // Split into three parts: before, selected, after
      const before = originalText.substring(0, start);
      const selected = originalText.substring(start, end);
      const after = originalText.substring(end);

      // Build new children array with Slate normalization:
      // inline elements must have text nodes before and after them.
      const newChildren = [];

      // Always add text before inline (empty if no content before selection)
      newChildren.push({ text: before });

      // Wrap selected text in format element
      if (selected) {
        newChildren.push({
          type: format,
          children: [{ text: selected }]
        });
      }

      // Always add text after inline (empty if no content after selection)
      newChildren.push({ text: after });

      paragraph.children = newChildren;

      // Add nodeIds to the result
      // No addNodeIds needed — hydra.js adds them when it receives FORM_DATA.
      return result;
    }

    function applySlateDelete(value, selection) {
      if (!selection || !value[0]) return value;
      // For a non-collapsed selection, replace all content with empty text.
      // This is a simplified mock — real Slate handles partial deletes, but
      // for testing buffer replay we just need the content to be cleared.
      // No addNodeIds needed — hydra.js adds them when it receives FORM_DATA.
      const result = JSON.parse(JSON.stringify(value));
      const paragraph = result[0];
      paragraph.children = [{ text: '' }];
      return result;
    }

    // Mock form data — loaded from ?content= JSON file or hardcoded default
    let mockFormData;

    // Default inline form data for existing mock parent tests
    const defaultFormData = {
      '@id': 'http://localhost:8888/_test_data/test-page',
      '@type': 'Document',
      title: 'Mock Test Page',
      blocks: {
        'mock-block-1': {
          '@type': 'slate',
          value: [
            {
              type: 'p',
              children: [
                {
                  text: 'Text to format',
                },
              ],
            },
          ],
        },
        'mock-text-block': {
          '@type': 'slate',
          value: [{ type: 'p', children: [{ text: 'Simple text field' }] }],
        },
        'mock-multi-field-block': {
          '@type': 'hero',
          heading: 'Block Title',
          subheading: 'Subtitle text',
          buttonText: 'Click',
          description: [
            {
              type: 'p',
              children: [
                {
                  text: 'Block description with slate',
                },
              ],
            },
          ],
        },
        'mock-textarea-block': {
          '@type': 'slate',
          value: [{ type: 'p', children: [{ text: 'First line of textarea' }] }],
        },
        'mock-image-block': {
          '@type': 'image',
          url: 'https://example.com/test.jpg',
          alt: 'Test image',
        },
        'mock-hero-block': {
          '@type': 'hero',
          heading: 'Simple text field',
          subheading: 'Textarea content',
          buttonText: 'Click me',
          description: [
            {
              type: 'p',
              children: [{ text: 'Hero description' }],
            },
          ],
        },
        // Columns container with two columns, each containing a slate block
        // Uses shared blocks dict format: all child blocks in mock-columns.blocks,
        // layout fields (columns) reference them by ID.
        'mock-columns': {
          '@type': 'columns',
          blocks: {
            'mock-col-1': {
              '@type': 'column',
              blocks: {
                'mock-col1-slate': {
                  '@type': 'slate',
                  value: [{ type: 'p', children: [{ text: 'Column 1 text' }] }],
                },
              },
              blocks_layout: { items: ['mock-col1-slate'] },
            },
            'mock-col-2': {
              '@type': 'column',
              blocks: {
                'mock-col2-slate': {
                  '@type': 'slate',
                  value: [{ type: 'p', children: [{ text: 'Column 2 text' }] }],
                },
              },
              blocks_layout: { items: ['mock-col2-slate'] },
            },
          },
          columns: { items: ['mock-col-1', 'mock-col-2'] },
        },
        // slateTable: 2x2 grid for table-mode navigation tests
        // Uses the existing slateTable renderer format: table.rows[].cells[]
        // with .key as block UID, data-block-add="bottom" on rows, "right" on cells
        'mock-table': {
          '@type': 'slateTable',
          table: {
            rows: [
              {
                key: 'mock-row-1',
                cells: [
                  {
                    key: 'mock-cell-1a',
                    type: 'data',
                    value: [{ type: 'p', children: [{ text: 'Cell 1A' }] }],
                  },
                  {
                    key: 'mock-cell-1b',
                    type: 'data',
                    value: [{ type: 'p', children: [{ text: 'Cell 1B' }] }],
                  },
                ],
              },
              {
                key: 'mock-row-2',
                cells: [
                  {
                    key: 'mock-cell-2a',
                    type: 'data',
                    value: [{ type: 'p', children: [{ text: 'Cell 2A' }] }],
                  },
                  {
                    key: 'mock-cell-2b',
                    type: 'data',
                    value: [{ type: 'p', children: [{ text: 'Cell 2B' }] }],
                  },
                ],
              },
            ],
          },
        },
      },
      blocks_layout: {
        items: ['mock-block-1', 'mock-text-block', 'mock-multi-field-block', 'mock-textarea-block', 'mock-image-block', 'mock-columns', 'mock-table', 'mock-hero-block'],
      },
    };

    // Load content: fetch from ?content= JSON file, ?api_path= API path, or use default
    if (contentName) {
      fetch(`/${contentName}.json`)
        .then(res => res.json())
        .then(data => {
          mockFormData = data;
          console.log(`[MOCK_PARENT] Loaded content from /${contentName}.json`);
          createIframe();
        });
    } else if (apiPath) {
      console.log(`[MOCK_PARENT] Fetching content from API: ${apiPath}`);
      fetch(apiPath, { headers: { Accept: 'application/json' } })
        .then(res => {
          if (!res.ok) throw new Error(`API fetch failed: ${res.status} ${res.statusText}`);
          return res.json();
        })
        .then(data => {
          mockFormData = data;
          console.log(`[MOCK_PARENT] Loaded content from API: ${apiPath} (${Object.keys(data.blocks || {}).length} blocks)`);
          createIframe();
        })
        .catch(err => {
          console.error(`[MOCK_PARENT] Failed to load API content: ${err.message}`);
        });
    } else {
      mockFormData = defaultFormData;
    }

    // Hardcoded responses are no longer needed - we use real Slate transformations

    // Message log
    const logEl = document.getElementById('log');
    function logMessage(direction, type, data) {
      const entry = document.createElement('div');
      entry.className = `log-entry log-${direction}`;
      entry.textContent = `[${direction.toUpperCase()}] ${type}: ${JSON.stringify(data)}`;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // Listen for messages from iframe (async to support delayed transforms)
    window.addEventListener('message', async (event) => {
      // Only handle messages from our iframe
      if (event.source !== document.getElementById('previewIframe').contentWindow) {
        return;
      }

      const message = event.data;
      console.log('[MOCK_PARENT] Received message:', message);
      logMessage('received', message.type, message);

      // Handle different message types
      switch (message.type) {
        case 'INIT': {
          // New INIT message format from hydra.js
          // Merge frontend's blocksConfig (sent via bridge, just like View.jsx does)
          console.log('[MOCK_PARENT] Received INIT message:', message);
          if (message.blocks) {
            for (const [blockType, blockDef] of Object.entries(message.blocks)) {
              if (!mockBlocksConfig[blockType]) {
                mockBlocksConfig[blockType] = blockDef;
              }
            }
          }

          const blockPathMap = buildBlockPathMap(mockFormData, mockBlocksConfig);

          const response = {
            type: 'INITIAL_DATA',
            data: mockFormData,
            blockPathMap,

            slateConfig: {
              hotkeys: {
                'mod+b': { type: 'inline', format: 'strong' },
                'mod+i': { type: 'inline', format: 'em' },
                'mod+u': { type: 'inline', format: 'u' },
                'mod+s': { type: 'inline', format: 'del' },
              },
              toolbarButtons: [],
              buttonConfigs: {
                'bold': {
                  format: 'strong',
                  svg: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M15.6 10.79c.97-.67 1.65-1.77 1.65-2.79 0-2.26-1.75-4-4-4H7v14h7.04c2.09 0 3.71-1.7 3.71-3.79 0-1.52-.86-2.82-2.15-3.42zM10 6.5h3c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-3v-3zm3.5 9H10v-3h3.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5z"/></svg>',
                  title: 'Bold',
                  testId: 'bold-button',
                },
              },
            },
          };
          console.log('[MOCK_PARENT] Sending INITIAL_DATA with blockPathMap:', response);
          event.source.postMessage(response, event.origin);
          logMessage('sent', 'INITIAL_DATA', response.data);

          // Auto-select the first block after a short delay to allow hydra.js to initialize
          setTimeout(() => {
            const firstBlockId = mockFormData.blocks_layout.items[0];
            if (firstBlockId) {
              console.log('[MOCK_PARENT] Auto-selecting first block:', firstBlockId);

              event.source.postMessage(
                {
                  type: 'SELECT_BLOCK',
                  uid: firstBlockId,
                  data: mockFormData,
                  blockPathMap: blockPathMap,
                },
                event.origin,
              );
              logMessage('sent', 'SELECT_BLOCK', { uid: firstBlockId });
            }
          }, 100);
          break;
        }

        case 'GET_INITIAL_DATA': {
          // Legacy handler for backwards compatibility
          console.log('[MOCK_PARENT] Received legacy GET_INITIAL_DATA');

          const blockPathMap = buildBlockPathMap(mockFormData, mockBlocksConfig);

          const response = {
            type: 'INITIAL_DATA',
            data: mockFormData,
            blockPathMap,

            slateConfig: {
              hotkeys: {
                'mod+b': { type: 'inline', format: 'strong' },
                'mod+i': { type: 'inline', format: 'em' },
                'mod+u': { type: 'inline', format: 'u' },
                'mod+s': { type: 'inline', format: 'del' },
              },
              toolbarButtons: [],
              buttonConfigs: {
                'bold': {
                  format: 'strong',
                  svg: '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M15.6 10.79c.97-.67 1.65-1.77 1.65-2.79 0-2.26-1.75-4-4-4H7v14h7.04c2.09 0 3.71-1.7 3.71-3.79 0-1.52-.86-2.82-2.15-3.42zM10 6.5h3c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-3v-3zm3.5 9H10v-3h3.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5z"/></svg>',
                  title: 'Bold',
                  testId: 'bold-button',
                },
              },
            },
          };
          console.log('[MOCK_PARENT] Sending INITIAL_DATA:', response);
          event.source.postMessage(response, event.origin);
          logMessage('sent', 'INITIAL_DATA', response.data);

          setTimeout(() => {
            const firstBlockId = mockFormData.blocks_layout.items[0];
            if (firstBlockId) {
              event.source.postMessage(
                {
                  type: 'SELECT_BLOCK',
                  uid: firstBlockId,
                  data: mockFormData,
                  blockPathMap: blockPathMap,
                },
                event.origin,
              );
              logMessage('sent', 'SELECT_BLOCK', { uid: firstBlockId });
            }
          }, 100);
          break;
        }

        case 'SLATE_TRANSFORM_REQUEST': {
          const { blockId, transformType, format, selection, requestId, fieldName, data } = message;
          console.log('[MOCK_PARENT] Processing SLATE_TRANSFORM_REQUEST:', { blockId, transformType, format, selection, requestId });

          // Simulate slow transform with configurable delay
          const transformDelay = window.mockTransformDelay || 0;
          const processTransform = async () => {
            if (transformDelay > 0) {
              console.log(`[MOCK_PARENT] Simulating slow transform with ${transformDelay}ms delay`);
              await new Promise(resolve => setTimeout(resolve, transformDelay));
            }

            // Update mockFormData from the message data (includes latest text)
            if (data) {
              mockFormData = data;
            }

            // Get current value from the correct field
            const block = mockFormData.blocks[blockId];
            const currentValue = block[fieldName] || block.value;

            console.log('[MOCK_PARENT] Applying Slate transformation:', {
              transformType,
              format,
              selection: JSON.stringify(selection),
              currentValue: JSON.stringify(currentValue)
            });

            // Apply the Slate transformation
            let updatedValue = currentValue;
            if (transformType === 'format' && format) {
              updatedValue = applySlateTransform(currentValue, selection, format, transformType);
            } else if (transformType === 'delete') {
              updatedValue = applySlateDelete(currentValue, selection);
            }

            console.log('[MOCK_PARENT] Transformation result:', JSON.stringify(updatedValue));

            // Update the block in mockFormData
            mockFormData.blocks[blockId] = {
              ...mockFormData.blocks[blockId],
              [fieldName || 'value']: updatedValue,
            };

            // Compute transformedSelection based on the transform result.
            // After a transform, the Slate tree structure changes, so the original
            // selection paths are invalid. We need to compute new paths.
            let transformedSelection = selection;
            if (transformType === 'delete') {
              // After delete, content is empty — cursor at start of first node
              transformedSelection = {
                anchor: { path: [0, 0], offset: 0 },
                focus: { path: [0, 0], offset: 0 },
              };
            } else if (transformType === 'format') {
              // After format, text may have moved into an inline element.
              // Find the inline element in the updated value and adjust paths.
              const block = mockFormData.blocks[blockId];
              const val = block[fieldName] || block.value;
              if (val && val[0] && val[0].children) {
                const inlineIdx = val[0].children.findIndex(c => c.type === format);
                if (inlineIdx >= 0) {
                  const inlineChild = val[0].children[inlineIdx];
                  const textLen = inlineChild.children?.[0]?.text?.length || 0;
                  if (selection && selection.anchor.offset === selection.focus.offset
                      && JSON.stringify(selection.anchor.path) === JSON.stringify(selection.focus.path)) {
                    // Collapsed selection (prospective formatting) — cursor inside inline
                    transformedSelection = {
                      anchor: { path: [0, inlineIdx, 0], offset: 0 },
                      focus: { path: [0, inlineIdx, 0], offset: 0 },
                    };
                  } else {
                    // Non-collapsed selection — select all text inside the inline
                    transformedSelection = {
                      anchor: { path: [0, inlineIdx, 0], offset: 0 },
                      focus: { path: [0, inlineIdx, 0], offset: textLen },
                    };
                  }
                }
              }
            }

            // Send FORM_DATA with formatRequestId so hydra.js knows to unblock
            const response = {
              type: 'FORM_DATA',
              data: mockFormData,
              blockPathMap: buildBlockPathMap(mockFormData, mockBlocksConfig),
  
              formatRequestId: requestId,
              transformedSelection,
            };
            console.log('[MOCK_PARENT] Sending FORM_DATA with formatRequestId:', response);
            event.source.postMessage(response, event.origin);
            logMessage('sent', 'FORM_DATA', { blockId, formatRequestId: requestId });

            // Optionally send a duplicate FORM_DATA after a delay to simulate
            // the real admin's Redux-triggered re-render cascade.
            if (window.mockDuplicateFormData) {
              setTimeout(() => {
                const dupeResponse = {
                  type: 'FORM_DATA',
                  data: mockFormData,
                  blockPathMap: buildBlockPathMap(mockFormData, mockBlocksConfig),
      
                };
                event.source.postMessage(dupeResponse, event.origin);
                console.log('[MOCK_PARENT] Sent duplicate FORM_DATA (Redux echo)');
              }, 50);
            }
          };

          // Execute the async transform (with optional delay) - await to ensure delay happens
          await processTransform();
          break;
        }

        case 'SELECT_BLOCK':
        case 'FORM_DATA': {
          // Just log these for now
          console.log('[MOCK_PARENT] Received but not handling:', message.type);
          break;
        }

        case 'INLINE_EDIT_DATA': {
          // Handle text changes from non-Slate blocks
          console.log('[MOCK_PARENT] Received INLINE_EDIT_DATA:', message);
          // Update mockFormData with the changes
          mockFormData = message.data;
          logMessage('RECEIVED', 'INLINE_EDIT_DATA', message);

          // Optionally echo FORM_DATA back (like real admin does).
          // Real admin has a React render cycle before sending, so use setTimeout.
          if (window.mockEchoFormData) {
            const echoData = JSON.parse(JSON.stringify(mockFormData));
            const delay = window.mockEchoDelay !== undefined ? window.mockEchoDelay : 10;
            const sendEcho = () => {
              const iframe = document.getElementById('previewIframe');
              iframe.contentWindow.postMessage({
                type: 'FORM_DATA',
                data: echoData,
                blockPathMap: buildBlockPathMap(mockFormData, mockBlocksConfig),
    
              }, '*');
              console.log('[MOCK_PARENT] Echoed FORM_DATA back');
            };
            if (delay === 0) {
              sendEcho();
            } else {
              setTimeout(sendEcho, delay);
            }
          }
          break;
        }

        case 'BLOCK_SELECTED': {
          // Track the last selected block for test assertions
          window.mockParent.lastSelectedBlockUid = message.blockUid;
          // Position the block UI overlays based on rect from iframe
          const { rect, blockUid } = message;
          if (rect) {
            const iframe = document.getElementById('previewIframe');
            const iframeRect = iframe.getBoundingClientRect();

            // Position overlays relative to iframe position
            const toolbar = document.getElementById('quanta-toolbar');
            const outline = document.getElementById('block-outline');
            const addButton = document.getElementById('add-button');

            // Toolbar above block
            toolbar.style.left = `${iframeRect.left + rect.left}px`;
            toolbar.style.top = `${iframeRect.top + rect.top - 30}px`;
            toolbar.style.display = 'block';

            // Outline around block
            outline.style.left = `${iframeRect.left + rect.left}px`;
            outline.style.top = `${iframeRect.top + rect.top}px`;
            outline.style.width = `${rect.width}px`;
            outline.style.height = `${rect.height}px`;
            outline.style.display = 'block';

            // Add button below block
            addButton.style.left = `${iframeRect.left + rect.left + rect.width / 2 - 12}px`;
            addButton.style.top = `${iframeRect.top + rect.top + rect.height + 8}px`;
            addButton.style.display = 'block';

            console.log('[MOCK_PARENT] Positioned overlays for block:', blockUid, 'rect:', rect);
          }
          break;
        }

        default: {
          console.log('[MOCK_PARENT] Unknown message type:', message.type);
        }
      }
    });

    console.log('[MOCK_PARENT] Message listener registered');

    // Make mock parent available to tests
    window.mockParent = {
      getFormData: () => mockFormData,
      getBlocksConfig: () => mockBlocksConfig,
      getBlock: (blockId) => mockFormData.blocks[blockId],
      buildBlockPathMap: () => buildBlockPathMap(mockFormData, mockBlocksConfig),
      setTransformDelay: (delay) => { window.mockTransformDelay = delay; },
      setEchoFormData: (enabled) => { window.mockEchoFormData = enabled; },
      setDuplicateFormData: (enabled) => { window.mockDuplicateFormData = enabled; },
      // Select a specific block by sending SELECT_BLOCK + FORM_DATA to iframe
      selectBlock: (blockId) => {
        const iframe = document.getElementById('previewIframe');
        if (!iframe?.contentWindow) return;
        const blockPathMap = buildBlockPathMap(mockFormData, mockBlocksConfig);
        iframe.contentWindow.postMessage({
          type: 'SELECT_BLOCK',
          uid: blockId,
          data: mockFormData,
          blockPathMap,
        }, '*');
        console.log('[MOCK_PARENT] selectBlock:', blockId);
      },
    };
  </script>
</body>
</html>
