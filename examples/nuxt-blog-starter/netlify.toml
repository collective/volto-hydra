[build]
  # Netlify's GitHub integration auto-triggers a build on every push and
  # PR. We don't want that — production deploys happen via the project's
  # `deploy-all.sh` script (which calls `netlify deploy --prod
  # --dir=.output/public` with a pre-built directory). Any Netlify-side
  # rebuild would race with `deploy-all.sh` and burn CI on every PR.
  #
  # `netlify deploy --prod --dir=...` from the CLI uploads the pre-built
  # tree directly and ignores this command, so the deploy script keeps
  # working unchanged.
  command = "mkdir -p .output/public && echo 'Netlify auto-build disabled — production deploys go via deploy-all.sh' > .output/public/index.html"
  publish = ".output/public"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "frame-ancestors https://hydra.pretagov.com https://*.pretagov.com http://localhost:*"

# Disable pretty URLs (trailing slash redirects) — breaks Nuxt SSG payload resolution
[build.processing]
  skip_processing = false
[build.processing.html]
  pretty_urls = false

# SPA fallback for edit mode (client-side routing)
[[redirects]]
  from = "/edit/*"
  to = "/edit/index.html"
  status = 200

[images]
  remote_images = ["https://hydra-api.pretagov.com/.*"]
