          DISCOVER_BLOCKS_API: http://localhost:8888
          FRONTEND_URL: http://localhost:3003
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-nuxt-bridge
          path: |
            playwright-report/
            test-results/**/*.png
          retention-days: 7

