name: Build and test

on:
  push:

jobs:
  # ── Build Volto and upload artifact ──────────────────────────────────────
  build:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup pnpm
        run: |
          npm install -g corepack
          corepack cache clean
          corepack enable
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: |
          pnpm dlx mrs-developer missdev --no-config --fetch-https
          pnpm install --frozen-lockfile
      - name: Run hydra-js unit tests
        run: cd packages/hydra-js && pnpm test
      - name: Build Volto for production
        run: pnpm build
        env:
          RAZZLE_API_PATH: http://localhost:8888
          RAZZLE_DEFAULT_IFRAME_URL: http://localhost:8889,http://localhost:3003,http://localhost:3004,http://localhost:3005,http://localhost:3006,http://localhost:3007,http://localhost:3008
          VOLTOCONFIG: ${{ github.workspace }}/volto.config.js
      - name: Upload Volto build
        uses: actions/upload-artifact@v4
        with:
          name: volto-build
          path: build/
          retention-days: 1

  # ── Bridge + unit tests (no Volto needed) ────────────────────────────────
  test-bridge-unit:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup pnpm
        run: |
          npm install -g corepack
          corepack cache clean
          corepack enable
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: |
          pnpm dlx mrs-developer missdev --no-config --fetch-https
          pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium firefox firefox
      - name: Install Playwright deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium firefox firefox
      - name: Start servers
        run: |
          node tests-playwright/fixtures/mock-api-server.js &
          cd docs/blocks/test-react && npx vite --port 3004 --strictPort &
          cd docs/blocks/test-svelte && npx vite --port 3005 --strictPort &
          cd docs/blocks/test-vue && npx vite --port 3006 --strictPort &
          sleep 3
      - name: Wait for servers
        run: |
          for port in 8888 8889 3004 3005 3006; do
            echo "Waiting for port $port..."
            for i in {1..30}; do
              curl -s http://localhost:$port > /dev/null && break
              sleep 2
            done
          done
          echo "All servers ready"
      - name: Run tests
        run: pnpm exec playwright test --project=unit --project=unit-firefox --project=mock --project=react --project=svelte --project=vue --reporter=github,list,html
        env:
          CI: true
          NO_WEBSERVER: true
          SKIP_VOLTO_CHECK: true
          COVERAGE: true
          DISCOVER_BLOCKS_API: http://localhost:8888
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-bridge-unit
          path: |
            playwright-report/
            test-results/**/*.png
          retention-days: 7
      - name: Upload coverage
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: bridge-unit
          fail_ci_if_error: false

  # ── Admin integration tests (mock frontend) ─────────────────────────────
  test-admin-mock:
    needs: build
    runs-on: 'ubuntu-latest'
    steps:
      - uses: actions/checkout@v4
