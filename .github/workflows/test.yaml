      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: |
          pnpm dlx mrs-developer missdev --no-config --fetch-https
          pnpm install --frozen-lockfile
      - name: Download Volto build
        uses: actions/download-artifact@v4
        with:
          name: volto-build
          path: build/
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium firefox
      - name: Install Playwright deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium firefox
      - name: Start servers
        run: |
          node tests-playwright/fixtures/mock-api-server.js &
          PORT=3001 RAZZLE_API_PATH=http://localhost:8888 \
            RAZZLE_DEFAULT_IFRAME_URL=http://localhost:8889,http://localhost:3003 \
            VOLTOCONFIG=${{ github.workspace }}/volto.config.js \
            pnpm start:prod &
          sleep 3
      - name: Wait for servers
        run: |
          for port in 8888 8889 3001; do
            echo "Waiting for port $port..."
            for i in {1..30}; do curl -s http://localhost:$port > /dev/null && break; sleep 2; done
          done
          echo "All servers ready"
      - name: Run tests
        run: pnpm exec playwright test --project=admin-mock --reporter=github,list,html
        env:
          CI: true
          NO_WEBSERVER: true
          USE_PREBUILT: true
          COVERAGE: true
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-admin-mock
          path: |
            playwright-report/
            test-results/**/*.png
          retention-days: 7
      - name: Upload coverage
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: admin-mock
          fail_ci_if_error: false

  # ── Nuxt bridge tests (no Volto needed) ─────────────────────────────────
