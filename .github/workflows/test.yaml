      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: |
          pnpm dlx mrs-developer missdev --no-config --fetch-https
          pnpm install --frozen-lockfile
      - name: Install and build Nuxt
        run: cd examples/nuxt-blog-starter && pnpm install --ignore-workspace && pnpm run build:test
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium firefox
      - name: Install Playwright deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium firefox
      - name: Start servers
        run: |
          node tests-playwright/fixtures/mock-api-server.js &
          cd examples/nuxt-blog-starter && pnpm run preview:test &
          sleep 3
      - name: Wait for servers
        run: |
          for port in 8888 8889 3003; do
            echo "Waiting for port $port..."
            for i in {1..30}; do curl -s http://localhost:$port > /dev/null && break; sleep 2; done
          done
          echo "All servers ready"
      - name: Run tests
        run: pnpm exec playwright test --project=nuxt --project=nuxt-firefox --reporter=github,list,html
        env:
          CI: true
          NO_WEBSERVER: true
